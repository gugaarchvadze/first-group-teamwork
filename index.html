<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lux Ventus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
    <div class="container">

            <!-- Logo -->
            <div class="logo">
                <img src="./Component 1.png" alt="Lux Ventus Logo">
            </div>

            <!-- Right side (Nav + Contact + Search ერთად) -->
            <div class="menu-section">
                <nav class="nav">

                    <a href="#" class="contact-btn">Contact Us</a>

            </div>

    </div>
</header>
    <div class="card-conteiner">

        </div>

    </div>

<section class="topics">

            <div class="topic-card">

            </div>

                <img src="./3.png" alt="">

                <button>View More</button>
            </div>

            <div class="topic-card">
                <img src="./4.png" alt="">

                <button>View More</button>
            </div>

            <div class="topic-card">
                <img src="./5.png" alt="">
                <h3>Ensembles</h3>
                <button>View More</button>
            </div>

            <div class="topic-card active">
                <img src="./6.png" alt="">

            </div>

    </div>
  </div>
</section>
